<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4d6679"/>
      <stop offset="0.5" stop-color="#6e8596"/>
      <stop offset="1" stop-color="#4f687a"/>
    </linearGradient>
    <pattern id="grain" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="none"/>
      <rect y="1" width="8" height="1" fill="#ffffff" opacity="0.06"/>
      <rect y="4" width="8" height="1" fill="#000000" opacity="0.07"/>
    </pattern>
  </defs>
  <rect width="256" height="256" fill="url(#bg)"/>
  <rect width="256" height="256" fill="url(#grain)"/>
</svg>
