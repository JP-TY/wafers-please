  </defs>
  <rect x="2" y="2" width="476" height="116" rx="12" fill="url(#plate)" stroke="#3f6b8b" stroke-width="3"/>
  <rect x="12" y="12" width="456" height="18" rx="4" fill="url(#stripe)" opacity="0.95"/>
