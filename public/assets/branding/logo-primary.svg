  <path d="M38 60h40M58 40v40" stroke="#d6edff" stroke-width="1.5" opacity="0.5"/>
  <text x="98" y="57" fill="#eff8ff" font-size="33" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="800" letter-spacing="1.5">WAFERS</text>
  <text x="98" y="87" fill="#9fd4f2" font-size="24" font-family="Inter,Segoe UI,Arial,sans-serif" font-weight="700" letter-spacing="3">PLEASE</text>
