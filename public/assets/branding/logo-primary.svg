<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" role="img" aria-labelledby="title desc">
  <title id="title">Wafers Please Logo</title>
  <desc id="desc">Retro industrial badge style logo for Wafers Please.</desc>
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#274863"/>
      <stop offset="1" stop-color="#14273a"/>
    </linearGradient>
    <linearGradient id="stripe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8dc3e5"/>
      <stop offset="0.5" stop-color="#4c7da8"/>
